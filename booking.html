<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva tu Cita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/booking.css" />
    <link rel="stylesheet" href="css/time-selection.css" />
</head>
<body>
    <header>
      <h2>Barbershop</h2>
    </header>

    <main>
        <section class="hero">
            <h2>Agendar Cita</h2>
            <p>Escoge el día y hora preferida para tu cita.</p>
        </section>

        <section class="calendar-type">
            <h3>Seleccionar Fecha</h3>
            <div class="style-calendar">
                <button class="monthly active">MONTH</button>
                <button class="weekly">WEEK</button>
            </div>
        </section>

        <section class="calendar">
            <booking-calendar/>
        </section>

        <section class="available-schedule">
            <h3>Horario Disponible</h3>
            <div class="time-selection-container"/>
        </section>

        <!-- Añadimos el ID para la lógica de mostrar/ocultar y cerramos los divs correctamente -->
        <aside class="summary-card hidden" id="summaryCard">
            <p class="section-title">SERVICIOS SELECCIONADOS</p>
            
            <div class="services-list" id="servicesList">
                <!-- Aquí inyectarás los servicios con JS -->
            </div>

            <hr class="divider">

            <div class="booking-details">
                <div class="booking-summary-row">
                    <div class="badges-group">
                       <span class="badge" id="summary-date">SELECCIONAR FECHA</span>
                        <span class="badge" id="summary-time">--:--</span>
                        <span class="badge" id="summary-duration">0 MIN</span>
                    </div>

                    <div class="total-group">
                        <span class="total-label">TOTAL</span>
                        <span class="total-amount" id="summary-total">$0.00</span>
                    </div>
                </div>
            </div>

            <button class="btn-confirm">Confirmar Cita →</button>
            <button class="btn-back" id="closeSummary">Regresar</button>
        </aside>


        
    </main>
    <script type="module" src="./js/components/calendar/BookingCalendar.js"></script>
    <script type="module" src="js/booking.js"></script>
</body>
</html>
