<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbershop Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h2>Barbershop</h2>
  </header>

  <main>
    <section class="hero">
      <h2>
        Hola Jacobo, 
        <span class="pregunta">¿Cuál será tu próximo estilo?</span>
      </h2>
      <p>Selecciona uno o más servicios para tu sesión</p>
    </section>

    <section class="shop-info">
      <h3>Barbería El Inge • Av. Insurgentes 123</h3>
    </section>

    <section class="services">
      <div class="tabs">
        <button class="tablinks">Corte</button>
        <button class="tablinks">Barba</button>
        <button class="tablinks">Facial</button>
        <button class="tablinks">Combos</button>
      </div>

      <div class="tabcontent">Corte</div>
      <div class="tabcontent">Barba</div>
      <div class="tabcontent">Facial</div>
      <div class="tabcontent">Combos</div>
    </section>
  </main>

  <footer class="footer">
    <h2>Resumen de selección</h2>
  </footer>
</body>
</html>
